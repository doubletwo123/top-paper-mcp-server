# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

build:
  dockerfile: Dockerfile
  dockerBuildPath: .

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required: []
    properties:
      storagePath:
        type: string
        default: /tmp/top-paper-papers
        description: The path to store downloaded papers. Defaults to /tmp/top-paper-papers.
  commandFunction:
    # A JS function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'python', args: ['-m', 'top_paper_mcp_server', '--storage-path', config.storagePath || '/tmp/top-paper-papers'] })